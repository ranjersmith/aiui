services:
  llm-ui:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: aiui-llm-ui:local
    ports:
      - "3311:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # aiui-proxy uses /chat on same origin.
      # openai uses a same-origin /llm reverse proxy to avoid browser CORS issues.
      LLM_UI_PROVIDER: "openai"
      LLM_UI_BASE_URL: "/llm"
      LLM_UI_PROXY_TARGET: "http://host.docker.internal:8081"
      # Set as "Bearer <token>" when upstream requires auth.
      LLM_UI_PROXY_AUTH_HEADER: ""
      LLM_UI_MODEL: "Qwen/Qwen3-VL-8B-Instruct"
      LLM_UI_TEMPERATURE: "0.7"
      LLM_UI_MAX_TOKENS: "512"
